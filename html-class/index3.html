
<!DOCTYPE html>
<html>
<head>
    <title>Complete HTML Form Example</title>
</head>
<body>

<h1>Student Registration Form</h1>

<form action="#" method="post">

    <!-- Personal Details -->
    <fieldset>
        <legend>Personal Details</legend>

        <label for="fn">First Name:</label>
        <input type="text" id="fn" name="first_name" placeholder="Enter first name" required>

        <br>
        <br>

        <label for="ln">Last Name:</label>
        <input type="text" id="ln" name="last_name" placeholder="Enter last name">

        <br><br>

        <label for="email">Email Address:</label>
        <input type="email" id="email" name="email"
               placeholder="user@example.com">

        <br><br>

        <label for="pass">Password:</label>
        <input type="password" id="pass" name="password"
               minlength="8">

        <br><br>

        <label for="phone">Phone Number:</label>
        <input type="tel" id="phone" name="phone"
               pattern="[0-9]{10}"
               placeholder="10-digit number">

        <br><br>

        <label for="dob">Date of Birth:</label>
        <input type="date" id="dob" name="dob">

    </fieldset>

    <br>

    <!-- Gender -->
    <fieldset>
        <legend>Gender</legend>

        <input type="radio" id="male" name="gender" value="male">
        <label for="male">Male</label>

        <input type="radio" id="female" name="gender" value="female">
        <label for="female">Female</label>

    </fieldset>

    <br>

    <!-- Skills -->
    <fieldset>
        <legend>Skills</legend>

        <input type="checkbox" id="html" name="skill1" value="HTML">
        <label for="html">HTML</label>

        <input type="checkbox" id="css" name="skill2" value="CSS">
        <label for="css">CSS</label>

        <input type="checkbox" id="js" name="skill3" value="JavaScript">
        <label for="js">JavaScript</label>

    </fieldset>

    <br>

    <!-- Country -->
    <label for="country">Country:</label>

    <select id="country" name="country">
        <option value="">-- Choose Country --</option>
        <option value="in">India</option>
        <option value="us">United States</option>
        <option value="uk">United Kingdom</option>
    </select>

    <br><br>

    <!-- Quantity -->
    <label for="qty">Quantity:</label>
    <input type="number" id="qty" name="quantity"
           min="1" max="100">

    <br><br>

    <!-- Range -->
    <label for="volume">Volume:</label>
    <input type="range" id="volume" name="volume"
           min="0" max="10">

    <br><br>

    <!-- File Upload -->
    <label for="resume">Upload Resume:</label>
    <input type="file" id="resume" name="resume"
           accept=".pdf,.doc">

    <br><br>

    <!-- Textarea -->
    <label for="bio">About Yourself:</label>
    <br>

    <textarea id="bio"
              name="bio"
              rows="5"
              cols="40"
              placeholder="Tell us about yourself...">
    </textarea>

    <br><br>

    <!-- Buttons -->
    <input type="submit" value="Register">

    <input type="reset" value="Reset">

</form>

</body>
</html>
